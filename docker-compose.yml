version: '3.8'

services:
  pansou:
    build: .
    image: pansou:local
    container_name: pansou
    restart: unless-stopped
    ports:
      - "8888:8888"
    # 从 .env 文件加载所有配置（需先 cp .env.example .env 并编辑）
    env_file:
      - .env
    # Docker 专用覆盖：容器内缓存路径必须为 /app/cache（对应 volume 挂载）
    environment:
      - CACHE_PATH=/app/cache
    volumes:
      - pansou-cache:/app/cache
    networks:
      - pansou-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8888/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # 如果需要代理，取消下面的注释
  # proxy:
  #   image: ghcr.io/snail007/goproxy:latest
  #   container_name: pansou-proxy
  #   restart: unless-stopped
  #   command: /proxy socks -p :7897
  #   networks:
  #     - pansou-network

volumes:
  pansou-cache:
    name: pansou-cache

networks:
  pansou-network:
    name: pansou-network 